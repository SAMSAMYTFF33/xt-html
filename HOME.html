<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>S2 Neon Menu</title>
<style>
body{
margin:0;
padding:0;
height:100vh;
display:flex;
flex-direction:column;
align-items:center;
justify-content:flex-start;
background: radial-gradient(circle at top,#1a001f,#000000 70%);
font-family:Arial, Helvetica, sans-serif;
color:white;
padding-top:20px; /* تصغير المسافة العلوية */
}

/* زر التحديث الصغير في الأعلى */
.update-container {
width: 90%;
max-width: 500px;
display: flex;
justify-content: flex-end;
margin-bottom: 10px;
}

.update-btn {
background: transparent;
border: 1px solid #ff00ff;
color: white;
font-size: 14px;
padding: 5px 12px;
border-radius: 20px;
cursor: pointer;
box-shadow: 0 0 5px #ff0000;
transition: 0.3s;
display: flex;
align-items: center;
gap: 5px;
}

.update-btn:hover {
box-shadow: 0 0 15px #ff00ff;
transform: scale(1.05);
background: rgba(255, 0, 255, 0.1);
}

.logo{
margin-bottom:30px; /* تصغير المسافة */
font-size:55px;
font-weight:bold;
color:#ff3c3c;
padding:15px 80px;
border-radius:60px;
border:3px solid transparent;
background: linear-gradient(#000,#000) padding-box,
linear-gradient(90deg,#ff0000,#ff00ff) border-box;
box-shadow:0 0 25px #ff0000,
0 0 50px #ff00ff;
text-align:center;
}

.container{
width:90%;
max-width:500px;
}

.row{
display:flex;
justify-content:space-between;
margin-bottom:25px;
}

.neon-btn{
flex:1;
margin:0 10px;
text-align:center;
padding:15px;
text-decoration:none;
font-size:20px;
font-weight:bold;
color:white;
border-radius:40px;
position:relative;
transition:0.3s;
background:#111;
border:2px solid transparent;
background-image: linear-gradient(#111,#111),
linear-gradient(90deg,#ff0000,#ff00ff);
background-origin:border-box;
background-clip:padding-box,border-box;
box-shadow:0 0 10px #ff0000,
0 0 20px #ff00ff;
}

.neon-btn:hover{
transform:scale(1.08);
box-shadow:0 0 25px #ff0000,
0 0 50px #ff00ff;
}

.single-row{
display:flex;
justify-content:space-between;
margin-bottom:25px;
}

@media(max-width:500px){
.row, .single-row{
flex-direction:column;
}
.neon-btn{
margin:10px 0;
}
.logo{
font-size:12vw;
padding:10px 20px;
}
}
</style>
</head>
<body>
<!-- ✅ زر التحديث الصغير مضاف هنا -->
<div class="update-container">
<button onclick="checkForUpdate()" class="update-btn">
update
</button>
</div>

<div class="logo">S2</div>

<div class="container">
<div class="row">
<a href="xt.html" class="neon-btn">مدخل للعلاقات الدولية </a>
<a href="xt.html" class="neon-btn">القانون التجاري الأساسي</a>
</div>

<div class="row">
<a href="xt.html" class="neon-btn">القانون الجنائي العام</a>
<a href="xt.html" class="neon-btn">النضرية العامة الإلتزامات</a>
</div>

<div class="single-row">
<a href="xt.html" class="neon-btn">مدخل للقانون الإداري وتنضيم الإداري</a>
<a href="xt.html" class="neon-btn">قانون معاملات الكترونية </a>
<a href="xt.html" class="neon-btn">المهارات الرقمية ودكاء الإصطناعي</a>
</div>
</div>

<script>
function checkForUpdate() {
if (AndroidBridge) {
AndroidBridge.checkForUpdate();
} else {
alert('زر التحديث يعمل فقط داخل التطبيق');
}
}
</script>
</body>
</html>
